name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # site.config.json supplies the default base URL; no BASE_URL secret is required.
      # To point CI at a different environment, configure a repo/environment secret named
      # BASE_URL and add `env: { BASE_URL: ${{ secrets.BASE_URL }} }` back here — do not
      # reference a secret that may not exist, since an unset secret interpolates to an
      # empty string (not "unset") and silently breaks every test's navigation.
      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
