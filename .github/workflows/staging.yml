name: Playwright Tests (Staging)

# Manual only — this never runs on push/PR, so it can't affect the
# production-testing ci.yml workflow. Trigger it from the Actions tab.
on:
  workflow_dispatch:

jobs:
  test:
    name: Run Playwright Tests Against Staging
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # An unset GitHub Actions secret interpolates to an empty string, not
      # "unset" — that silently breaks baseURL and fails every test (see
      # ci.yml's history). Fail fast here instead of burning ~10 CI minutes.
      - name: Verify BASE_URL secret is configured
        run: |
          if [ -z "${{ secrets.BASE_URL }}" ]; then
            echo "::error::BASE_URL secret is not set. Add it under Settings > Secrets and variables > Actions > New repository secret before running this workflow."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests against staging
        run: npx playwright test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-staging
          path: playwright-report/
          retention-days: 14
